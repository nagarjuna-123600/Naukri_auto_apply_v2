name: Naukri Auto Apply Bot V2

on:
  schedule:
    - cron: "0 */4 * * *"   # runs every 4 hours
  workflow_dispatch:          # allows manual trigger

permissions:
  contents: write

jobs:
  apply-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Initialise log files
        run: |
          [ -s applied_jobs.json ] || echo "{}" > applied_jobs.json
          [ -s manual_apply_jobs.json ] || echo "{}" > manual_apply_jobs.json

      - name: Run Naukri bot
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          NAUKRI_COOKIES: ${{ secrets.NAUKRI_COOKIES }}
        run: python naukri_auto_apply_v2.py

      - name: Save logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: applied-jobs-log
          path: |
            applied_jobs.json
            manual_apply_jobs.json
            naukri_bot.log

      - name: Commit logs back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add applied_jobs.json manual_apply_jobs.json naukri_bot.log || true
          git diff --cached --quiet || git commit -m "Update applied jobs log [skip ci]"
          git push https://nagarjuna-123600:${{ secrets.PAT_TOKEN }}@github.com/nagarjuna-123600/Naukri_auto_apply_v2.git main || true
